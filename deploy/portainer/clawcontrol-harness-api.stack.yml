services:
  harness-api:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol}
      dockerfile: docker/harness-api.Dockerfile
    container_name: clawcontrol-harness-api
    restart: unless-stopped
    environment:
      PORT: 3939
      API_KEY: ${HARNESS_API_KEY}
      HARNESS_WORKSPACE: ${HARNESS_WORKSPACE:-/data/harness-workspace}
      ALLOWED_ORIGIN: ${HARNESS_ALLOWED_ORIGIN:-}
    ports:
      - "${HARNESS_API_BIND:-127.0.0.1:3939}:3939"
    volumes:
      - ${HARNESS_WORKSPACE_HOST_PATH:-/srv/harness/workspace}:${HARNESS_WORKSPACE:-/data/harness-workspace}
