# Batteries-included ClawControl stack for new installs.
#
# Existing deployments can keep using separately hosted services. This stack is
# for fresh Docker/Portainer installs where Supabase, Agent Secrets, AgentShell,
# memd, LightRAG, RAGAnything/MinerU, and RAG should ship beside ClawControl by
# default.

services:
  coaching-frontend:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-bundle/clawcontrol}
      dockerfile: docker/clawcontrol-frontend.Dockerfile
      args:
        VITE_API_BASE: ${FRONTEND_PUBLIC_API_BASE:-http://localhost:3010}
        VITE_SITE_URL: ${FRONTEND_PUBLIC_SITE_URL:-http://localhost:8088}
        VITE_ASSET_BASE: ${FRONTEND_PUBLIC_ASSET_BASE:-/}
    container_name: coaching-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:8088}:80"

  db:
    image: supabase/postgres:15.8.1.060
    container_name: clawcontrol-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXP:-3600}
    volumes:
      - ${SUPABASE_DB_VOLUME:-clawcontrol-supabase-db-data}:/var/lib/postgresql/data
      - ${SUPABASE_MIGRATIONS_PATH:-/opt/clawcontrol-bundle/clawcontrol/supabase/migrations}:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: clawcontrol-supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      db:
        condition: service_healthy

  auth:
    image: supabase/gotrue:v2.158.1
    container_name: clawcontrol-supabase-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${FRONTEND_PUBLIC_SITE_URL:-http://localhost:8088}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:3000/api/auth/callback,http://localhost:3010/api/auth/callback}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXP:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy

  realtime:
    image: supabase/realtime:v2.33.58
    container_name: clawcontrol-supabase-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: clawcontrol
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    depends_on:
      db:
        condition: service_healthy

  storage:
    image: supabase/storage-api:v1.11.13
    container_name: clawcontrol-supabase-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - ${SUPABASE_STORAGE_VOLUME:-clawcontrol-supabase-storage-data}:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started

  meta:
    image: supabase/postgres-meta:v0.83.2
    container_name: clawcontrol-supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  supabase-gateway:
    image: nginx:1.27-alpine
    container_name: clawcontrol-supabase-gateway
    restart: unless-stopped
    ports:
      - "${SUPABASE_BIND:-127.0.0.1:8000}:8000"
    volumes:
      - ${SUPABASE_GATEWAY_CONF:-/opt/clawcontrol-bundle/clawcontrol/docker/supabase-gateway.conf}:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rest
      - auth
      - realtime
      - storage

  secret-broker:
    build:
      context: ${AGENTSECRETS_BUILD_CONTEXT:-/opt/clawcontrol-bundle/AgentSecrets}
      dockerfile: Dockerfile
    container_name: clawcontrol-agentsecrets
    restart: unless-stopped
    environment:
      SECRET_BROKER_BIND: 0.0.0.0:4815
      SECRET_BROKER_DB: sqlite:///var/lib/secret-broker/secret-broker.db?mode=rwc
      SECRET_BROKER_MODE: ${SECRET_BROKER_MODE:-monitor}
      SECRET_BROKER_CLIENT_API_KEY: ${SECRET_BROKER_CLIENT_API_KEY}
      SECRET_BROKER_APPROVER_API_KEY: ${SECRET_BROKER_APPROVER_API_KEY}
      SECRET_BROKER_ALLOWED_TARGET_PREFIXES: ${SECRET_BROKER_ALLOWED_TARGET_PREFIXES:-}
      SECRET_BROKER_MAX_AMOUNT_CENTS: ${SECRET_BROKER_MAX_AMOUNT_CENTS:-10000}
      SECRET_BROKER_CAPABILITY_TTL_SECONDS: ${SECRET_BROKER_CAPABILITY_TTL_SECONDS:-300}
      SECRET_BROKER_REQUEST_TTL_SECONDS: ${SECRET_BROKER_REQUEST_TTL_SECONDS:-86400}
      SECRET_BROKER_RATE_LIMIT_PER_MINUTE: ${SECRET_BROKER_RATE_LIMIT_PER_MINUTE:-60}
      SECRET_BROKER_BITWARDEN_BASE_URL: ${SECRET_BROKER_BITWARDEN_BASE_URL:-}
      SECRET_BROKER_BITWARDEN_TOKEN: ${SECRET_BROKER_BITWARDEN_TOKEN:-}
      SECRET_BROKER_BITWARDEN_TIMEOUT_SECONDS: ${SECRET_BROKER_BITWARDEN_TIMEOUT_SECONDS:-30}
    ports:
      - "${SECRET_BROKER_BIND:-127.0.0.1:4815}:4815"
    volumes:
      - ${SECRET_BROKER_DATA_VOLUME:-clawcontrol-agentsecrets-data}:/var/lib/secret-broker
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4815/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  agentshell:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-bundle/clawcontrol}
      dockerfile: docker/agentshell-adapter.Dockerfile
    container_name: clawcontrol-agentshell
    restart: unless-stopped
    environment:
      AGENTSHELL_HOST: 0.0.0.0
      AGENTSHELL_PORT: 8077
    ports:
      - "${AGENTSHELL_BIND:-127.0.0.1:8077}:8077"

  harness-api:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-bundle/clawcontrol}
      dockerfile: docker/harness-api.Dockerfile
    container_name: clawcontrol-harness-api
    restart: unless-stopped
    environment:
      HARNESS_API_HOST: 0.0.0.0
      HARNESS_API_PORT: 3939
    ports:
      - "${HARNESS_API_BIND:-127.0.0.1:3939}:3939"

  memd-server:
    build:
      context: ${MEMD_BUILD_CONTEXT:-/opt/clawcontrol-bundle/memd}
      dockerfile: deploy/docker/Dockerfile.memd-server
    container_name: clawcontrol-memd
    restart: unless-stopped
    environment:
      MEMD_BIND_ADDR: 0.0.0.0:8787
      MEMD_DB_PATH: /data/memd.db
      MEMD_RAG_URL: http://memd-rag-sidecar:9000
      LIGHTRAG_BASE_URL: http://lightrag:9621
      RAGANYTHING_URL: http://raganything-miner:8010
    ports:
      - "${MEMD_BIND:-127.0.0.1:8787}:8787"
    volumes:
      - ${MEMD_DATA_VOLUME:-clawcontrol-memd-data}:/data

  memd-rag-sidecar:
    build:
      context: ${MEMD_BUILD_CONTEXT:-/opt/clawcontrol-bundle/memd}
      dockerfile: ${MEMD_RAG_DOCKERFILE:-/opt/clawcontrol-bundle/clawcontrol/docker/memd-rag-sidecar.Dockerfile}
    container_name: clawcontrol-memd-rag
    restart: unless-stopped
    environment:
      LIGHTRAG_BASE_URL: ${LIGHTRAG_BASE_URL:-http://lightrag:9621}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
      RAGANYTHING_URL: ${RAGANYTHING_URL:-http://raganything-miner:8010}
      MINERU_URL: ${MINERU_URL:-http://raganything-miner:8010}
    ports:
      - "${MEMD_RAG_BIND:-127.0.0.1:9000}:9000"
    volumes:
      - ${MEMD_RAG_DATA_VOLUME:-clawcontrol-memd-rag-data}:/data
    depends_on:
      - lightrag
      - raganything-miner

  lightrag:
    image: ${LIGHTRAG_IMAGE:-ghcr.io/hkuds/lightrag:latest}
    container_name: clawcontrol-lightrag
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 9621
      WORKING_DIR: /app/data/rag_storage
      INPUT_DIR: /app/data/inputs
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
      LLM_BINDING: ${LIGHTRAG_LLM_BINDING:-openai}
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST:-https://api.openai.com/v1}
      LLM_BINDING_API_KEY: ${LIGHTRAG_LLM_BINDING_API_KEY:-}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL:-gpt-5-mini}
      EMBEDDING_BINDING: ${LIGHTRAG_EMBEDDING_BINDING:-openai}
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST:-https://api.openai.com/v1}
      EMBEDDING_BINDING_API_KEY: ${LIGHTRAG_EMBEDDING_BINDING_API_KEY:-}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL:-text-embedding-3-large}
      EMBEDDING_DIM: ${LIGHTRAG_EMBEDDING_DIM:-3072}
      LIGHTRAG_KV_STORAGE: ${LIGHTRAG_KV_STORAGE:-JsonKVStorage}
      LIGHTRAG_DOC_STATUS_STORAGE: ${LIGHTRAG_DOC_STATUS_STORAGE:-JsonDocStatusStorage}
      LIGHTRAG_GRAPH_STORAGE: ${LIGHTRAG_GRAPH_STORAGE:-NetworkXStorage}
      LIGHTRAG_VECTOR_STORAGE: ${LIGHTRAG_VECTOR_STORAGE:-NanoVectorDBStorage}
    ports:
      - "${LIGHTRAG_BIND:-127.0.0.1:9621}:9621"
    volumes:
      - ${LIGHTRAG_DATA_VOLUME:-clawcontrol-lightrag-data}:/app/data

  raganything-miner:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-bundle/clawcontrol}
      dockerfile: docker/raganything-miner.Dockerfile
    container_name: clawcontrol-raganything-miner
    restart: unless-stopped
    environment:
      RAGANYTHING_HOST: 0.0.0.0
      RAGANYTHING_PORT: 8010
      RAGANYTHING_WORK_DIR: /data/raganything
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-local}
      LIGHTRAG_BASE_URL: ${LIGHTRAG_BASE_URL:-http://lightrag:9621}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
    ports:
      - "${RAGANYTHING_BIND:-127.0.0.1:8010}:8010"
    volumes:
      - ${RAGANYTHING_DATA_VOLUME:-clawcontrol-raganything-data}:/data
    depends_on:
      - lightrag

  mac-bridge:
    profiles: ["macos"]
    build:
      context: ${MAC_BRIDGE_BUILD_CONTEXT:-/opt/clawcontrol-bundle/mac-bridge}
      dockerfile: ${MAC_BRIDGE_DOCKERFILE:-/opt/clawcontrol-bundle/clawcontrol/docker/mac-bridge.Dockerfile}
    container_name: clawcontrol-mac-bridge
    restart: unless-stopped
    environment:
      BRIDGE_PORT: 4100
      BRIDGE_API_KEY: ${MAC_BRIDGE_API_KEY:-}
    ports:
      - "${MAC_BRIDGE_BIND:-127.0.0.1:4100}:4100"

  clawcontrol-backend:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-bundle/clawcontrol}
      dockerfile: docker/clawcontrol-backend.Dockerfile
    container_name: clawcontrol-backend
    restart: unless-stopped
    depends_on:
      - supabase-gateway
      - secret-broker
      - agentshell
      - harness-api
      - memd-server
      - memd-rag-sidecar
    environment:
      MC_BIND_HOST: 0.0.0.0
      MC_BIND_PORT: ${BACKEND_BIND_PORT:-3010}
      CLAWCONTROL_DATA_DIR: /var/lib/clawcontrol
      BACKEND_PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-http://localhost:3010}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8088}
      PAIRING_TOKEN: ${PAIRING_TOKEN}
      MC_AGENT_KEY: ${MC_AGENT_KEY}
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-gateway:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      HARNESS_API_URL: ${HARNESS_API_URL:-http://harness-api:3939}
      HARNESS_API_KEY: ${HARNESS_API_KEY:-}
      HARNESS_WS: ${HARNESS_WS:-ws://harness-api:3939/ws}
      HARNESS_PASSWORD: ${HARNESS_PASSWORD:-}
      AGENTSECRETS_URL: ${AGENTSECRETS_URL:-http://secret-broker:4815}
      AGENTSECRETS_CLIENT_API_KEY: ${AGENTSECRETS_CLIENT_API_KEY}
      SECRET_BROKER_APPROVER_API_KEY: ${SECRET_BROKER_APPROVER_API_KEY:-}
      AGENTSHELL_URL: ${AGENTSHELL_URL:-http://agentshell:8077}
      MEMD_BASE_URL: ${MEMD_BASE_URL:-http://memd-server:8787}
      MEMD_RAG_URL: ${MEMD_RAG_URL:-http://memd-rag-sidecar:9000}
      LIGHTRAG_BASE_URL: ${LIGHTRAG_BASE_URL:-http://lightrag:9621}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
      RAGANYTHING_URL: ${RAGANYTHING_URL:-http://raganything-miner:8010}
      MINERU_URL: ${MINERU_URL:-http://raganything-miner:8010}
      MAC_BRIDGE_HOST: ${MAC_BRIDGE_HOST:-}
      MAC_BRIDGE_API_KEY: ${MAC_BRIDGE_API_KEY:-}
      BLUEBUBBLES_HOST: ${BLUEBUBBLES_HOST:-}
      BLUEBUBBLES_PASSWORD: ${BLUEBUBBLES_PASSWORD:-}
    ports:
      - "${BACKEND_BIND:-127.0.0.1:3010}:3010"
    volumes:
      - ${BACKEND_DATA_VOLUME:-clawcontrol-backend-data}:/var/lib/clawcontrol

volumes:
  clawcontrol-backend-data:
  clawcontrol-agentsecrets-data:
  clawcontrol-memd-data:
  clawcontrol-memd-rag-data:
  clawcontrol-lightrag-data:
  clawcontrol-raganything-data:
  clawcontrol-supabase-db-data:
  clawcontrol-supabase-storage-data:
