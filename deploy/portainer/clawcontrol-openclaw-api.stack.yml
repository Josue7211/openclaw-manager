services:
  openclaw-api:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol}
      dockerfile: docker/openclaw-api.Dockerfile
    container_name: clawcontrol-openclaw-api
    restart: unless-stopped
    environment:
      PORT: 3939
      API_KEY: ${OPENCLAW_API_KEY}
      OPENCLAW_WORKSPACE: ${OPENCLAW_WORKSPACE:-/data/openclaw-workspace}
      ALLOWED_ORIGIN: ${OPENCLAW_ALLOWED_ORIGIN:-}
    ports:
      - "${OPENCLAW_API_BIND:-127.0.0.1:3939}:3939"
    volumes:
      - ${OPENCLAW_WORKSPACE_HOST_PATH:-/srv/openclaw/workspace}:${OPENCLAW_WORKSPACE:-/data/openclaw-workspace}
