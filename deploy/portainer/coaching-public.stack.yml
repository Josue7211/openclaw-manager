services:
  coaching-frontend:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-backend}
      dockerfile: docker/coaching-static.Dockerfile
    container_name: coaching-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:8088}:80"

  clawcontrol-backend:
    build:
      context: ${STACK_BUILD_CONTEXT:-/opt/clawcontrol-backend}
      dockerfile: docker/clawcontrol-backend.Dockerfile
    container_name: coaching-backend
    restart: unless-stopped
    network_mode: host
    environment:
      MC_BIND_HOST: 127.0.0.1
      MC_BIND_PORT: ${BACKEND_BIND_PORT:-3010}
      CLAWCONTROL_DATA_DIR: /var/lib/clawcontrol
      BACKEND_PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-https://coaching.aparcedo.org}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://coaching.aparcedo.org}
      PAIRING_TOKEN: ${PAIRING_TOKEN}
      MC_AGENT_KEY: ${MC_AGENT_KEY}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    volumes:
      - ${BACKEND_DATA_VOLUME:-coaching-backend-data}:/var/lib/clawcontrol

volumes:
  coaching-backend-data:
