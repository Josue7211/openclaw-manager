<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coaching Follow-Up</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg-base: #111018;
        --bg-card: #181622;
        --bg-elevated: #242130;
        --surface-soft: #1d1a29;
        --text-primary: #f0edf8;
        --text-secondary: #b8b0c9;
        --text-muted: #837a94;
        --text-on-accent: #110d18;
        --border: rgba(222, 214, 245, 0.1);
        --border-hover: rgba(222, 214, 245, 0.18);
        --accent: #b79cff;
        --accent-bright: #d2c3ff;
        --red: #fb7185;
        --green: #b79cff;
        --radius-sm: 8px;
        --radius-md: 10px;
        background: var(--bg-base);
        color: var(--text-primary);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-base);
      }
      main { width: min(760px, calc(100vw - 28px)); margin: 0 auto; padding: 34px 0 46px; }
      header {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
        color: var(--text-primary);
      }
      h1 { margin: 0; font-size: clamp(30px, 7vw, 48px); line-height: 1; letter-spacing: 0; }
      p { margin: 0; color: var(--text-secondary); line-height: 1.45; }
      header p { color: var(--text-secondary); max-width: 560px; }
      label { display: grid; gap: 7px; font-weight: 780; color: var(--text-primary); }
      label > span {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      select, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-elevated);
        color: var(--text-primary);
        font: inherit;
        padding: 10px 11px;
        outline: none;
        transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
      }
      textarea { min-height: 44px; resize: none; overflow: hidden; line-height: 1.45; }
      select:focus, textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        background: rgba(44, 44, 56, 0.86);
      }
      form { display: grid; gap: 14px; }
      .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: end; flex-wrap: wrap; }
      .language {
        min-width: 132px;
        max-width: 240px;
        color: var(--text-primary);
      }
      .language select {
        background: var(--bg-elevated);
        border-color: var(--border);
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--bg-card);
        border-radius: var(--radius-md);
        padding: 22px;
        display: grid;
        gap: 14px;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }
      button {
        border: 1px solid rgba(183, 156, 255, 0.48);
        border-radius: var(--radius-md);
        background: var(--accent);
        color: var(--text-on-accent);
        font-weight: 820;
        padding: 13px 16px;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(34, 24, 56, 0.32);
        transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
      }
      button:hover { filter: brightness(1.04); transform: translateY(-1px); }
      button:focus { outline: 3px solid rgba(183, 156, 255, 0.26); outline-offset: 2px; }
      button:disabled { opacity: .58; cursor: not-allowed; }
      .status { min-height: 22px; font-weight: 760; color: var(--green); padding: 2px 0; }
      .error { color: var(--red); }
      @media (max-width: 520px) {
        body { background: var(--bg-base); }
        main { width: min(100% - 22px, 780px); padding-top: 18px; }
        .topbar { display: grid; align-items: stretch; }
        .language { max-width: none; }
        .panel { padding: 14px; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="topbar">
          <div>
            <h1 id="title">Coaching follow-up</h1>
            <p id="subtitle">Loading form...</p>
          </div>
          <label class="language">
            <span>Language</span>
            <select id="language">
              <option value="en">English</option>
              <option value="es">Español</option>
            </select>
          </label>
        </div>
      </header>
      <form id="form" class="panel"></form>
      <p id="status" class="status"></p>
    </main>
    <script>
      const API_BASE = window.location.origin;
      const token = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
      const translations = {
        es: {
          title: 'Seguimiento de miembro',
          loading: 'Cargando formulario...',
          intro: 'Responde lo que cambió o lo que tu entrenador todavía necesita.',
          forClient: name => `Para ${name}`,
          submit: 'Enviar',
          sending: 'Enviando...',
          sent: 'Listo. Gracias, ya lo recibió tu entrenador.',
          error: 'No se pudo enviar. Intenta otra vez.',
          labels: {
            'Allergies (food or medication)': 'Alergias (comida o medicamentos)',
            'Supplements with doses': 'Suplementos con dosis',
            'Medications': 'Medicamentos',
            'Average sleep hours': 'Horas promedio de sueño',
            'Protein intake estimate (grams/day)': 'Proteína estimada (gramos/día)',
            'Favorite foods': 'Comidas favoritas',
            'Food dislikes / foods avoided': 'Comidas que no le gustan / evita',
            'How much water do you drink per day?': '¿Cuánta agua tomas al día?',
            'Questions for coach': 'Preguntas para el entrenador'
          }
        },
        en: {
          title: 'Coaching follow-up',
          loading: 'Loading form...',
          intro: 'Answer what changed or what your coach still needs.',
          forClient: name => `For ${name}`,
          submit: 'Submit',
          sending: 'Sending...',
          sent: 'Done. Thank you, your coach received it.',
          error: 'Could not submit. Try again.',
          labels: {}
        }
      };
      let intake = null;
      const form = document.getElementById('form');
      const language = document.getElementById('language');
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const subtitleEl = document.getElementById('subtitle');

      function t() { return translations[language.value] || translations.en; }
      function labelFor(field) { return t().labels[field] || field; }
      function autoGrow(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = `${textarea.scrollHeight}px`;
      }
      function render() {
        if (!intake) return;
        titleEl.textContent = t().title;
        subtitleEl.textContent = t().intro;
        form.innerHTML = '';
        intake.fields.forEach(field => {
          if (field === 'Client name' && intake.clientName) return;
          const label = document.createElement('label');
          const span = document.createElement('span');
          const textarea = document.createElement('textarea');
          span.textContent = labelFor(field);
          textarea.name = field;
          textarea.setAttribute('aria-label', labelFor(field));
          textarea.addEventListener('input', () => autoGrow(textarea));
          label.append(span, textarea);
          form.append(label);
        });
        const button = document.createElement('button');
        button.type = 'submit';
        button.textContent = t().submit;
        form.append(button);
      }
      language.addEventListener('change', render);
      form.addEventListener('submit', async event => {
        event.preventDefault();
        const submitButton = form.querySelector('button');
        submitButton.disabled = true;
        submitButton.textContent = t().sending;
        statusEl.textContent = '';
        statusEl.className = 'status';
        const answers = {};
        new FormData(form).forEach((value, key) => { answers[key] = String(value); });
        try {
          const response = await fetch(`${API_BASE}/api/training/public/intake/${encodeURIComponent(token)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers })
          });
          if (!response.ok) throw new Error('submit failed');
          statusEl.textContent = t().sent;
          form.querySelectorAll('textarea').forEach(textarea => { textarea.value = ''; autoGrow(textarea); });
        } catch {
          statusEl.textContent = t().error;
          statusEl.className = 'status error';
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = t().submit;
        }
      });
      (async function init() {
        try {
          const response = await fetch(`${API_BASE}/api/training/public/intake/${encodeURIComponent(token)}`);
          if (!response.ok) throw new Error('load failed');
          const payload = await response.json();
          intake = payload.data.form;
          language.value = intake.language || 'en';
          render();
        } catch {
          subtitleEl.textContent = 'Form unavailable.';
          statusEl.textContent = 'Check the link and try again.';
          statusEl.className = 'status error';
        }
      })();
    </script>
  </body>
</html>
