<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0d0a14"/>
    </linearGradient>
    <linearGradient id="claw" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="1008" height="1008" rx="216" fill="none" stroke="#a855f7" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Background glow -->
  <ellipse cx="512" cy="420" rx="280" ry="220" fill="url(#glow)"/>

  <!-- Three claw slashes -->
  <g filter="url(#shadow)">
    <!-- Left claw -->
    <path d="M 290 220 Q 270 380 320 560 Q 350 660 340 740"
          stroke="url(#claw)" stroke-width="52" stroke-linecap="round" fill="none"/>

    <!-- Center claw (tallest) -->
    <path d="M 512 180 Q 500 360 512 560 Q 520 680 510 780"
          stroke="url(#claw)" stroke-width="56" stroke-linecap="round" fill="none"/>

    <!-- Right claw -->
    <path d="M 734 220 Q 754 380 704 560 Q 674 660 684 740"
          stroke="url(#claw)" stroke-width="52" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Small accent dots at claw tips -->
  <circle cx="340" cy="740" r="12" fill="#c084fc" opacity="0.6"/>
  <circle cx="510" cy="780" r="14" fill="#c084fc" opacity="0.7"/>
  <circle cx="684" cy="740" r="12" fill="#c084fc" opacity="0.6"/>

  <!-- Subtle horizontal slash across the claws -->
  <path d="M 240 520 Q 400 490 512 500 Q 624 510 784 520"
        stroke="#c084fc" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.2"/>
</svg>
